<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario Seguro</title>
    <script src="script.js"defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Crear Cuenta</h2>
        <p class="subtitle">Regístrate en el sistema seguro</p>

        <!-- Formulario de registro -->
        <form id="registerForm">
            
            <!-- Campo: Nombre de Usuario -->
            <div class="input-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" placeholder="Ej: Cyber" required>
            </div>

            <!-- Campo: Correo Electrónico -->
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="Ej: vicho@correo.com" required>
            </div>

            <!-- Campo: Contraseña -->
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <!-- Botón de envío -->
            <button type="submit" class="btn-submit">Registrar Usuario</button>
            
        </form>

        <!-- Cuadro de mensaje para mostrar la respuesta de la API -->
        <div id="responseMessage" class="message hidden"></div>
    </div>

</body>
</html>
